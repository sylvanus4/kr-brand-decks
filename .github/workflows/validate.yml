name: validate
on:
  push:
    branches: [main]
  pull_request:

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace + skill manifests (zero-dep)
        run: python3 tools/validate_marketplace.py

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
